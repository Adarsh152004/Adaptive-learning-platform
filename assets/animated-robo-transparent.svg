<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Metallic/Glass Chassis Gradient -->
    <linearGradient id="chassis_main" x1="100" y1="120" x2="300" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.4" stop-color="#CBD5E1"/>
      <stop offset="1" stop-color="#64748B"/>
    </linearGradient>

    <!-- Glass Overlay -->
    <linearGradient id="visor_glass" x1="200" y1="120" x2="200" y2="290" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.2"/>
      <stop offset="0.5" stop-color="white" stop-opacity="0.05"/>
      <stop offset="1" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>

    <filter id="neon_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      @keyframes float-complex {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(0.5deg); }
      }
      
      @keyframes parallax-eyes {
        0%, 100% { transform: translate(0, 0); }
        25% { transform: translate(-8px, 2px); }
        75% { transform: translate(8px, -2px); }
      }

      @keyframes data-scan {
        0% { transform: translateY(-30px); opacity: 0; }
        50% { opacity: 0.8; }
        100% { transform: translateY(100px); opacity: 0; }
      }

      @keyframes flicker {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
        52% { opacity: 1; }
        54% { opacity: 0.8; }
      }

      .whole-bot { animation: float-complex 5s ease-in-out infinite; transform-origin: center; }
      .eye-group { animation: parallax-eyes 10s ease-in-out infinite; }
      .scan-line { animation: data-scan 3s linear infinite; }
      .antenna-tip { animation: flicker 4s step-end infinite; }
    </style>
  </defs>

  <!-- Animated Robot Group (Transparent Background) -->
  <g class="whole-bot">
    <!-- Antenna -->
    <path d="M200 120 V80" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <circle class="antenna-tip" cx="200" cy="75" r="6" fill="#6366F1" filter="url(#neon_glow)"/>
    
    <!-- Main Chassis -->
    <rect x="100" y="120" width="200" height="180" rx="90" fill="url(#chassis_main)" stroke="#475569" stroke-width="1"/>
    
    <!-- Visor Background -->
    <rect x="120" y="150" width="160" height="120" rx="60" fill="#0F172A"/>
    
    <!-- Animated Scan Line -->
    <mask id="visor-mask">
       <rect x="120" y="150" width="160" height="120" rx="60" fill="white"/>
    </mask>
    <g mask="url(#visor-mask)">
       <line class="scan-line" x1="120" y1="160" x2="280" y2="160" stroke="#6366F1" stroke-width="2" filter="url(#neon_glow)"/>
       <path d="M140 180 H260 M140 210 H260 M140 240 H260" stroke="#1E293B" stroke-width="1"/>
    </g>

    <!-- Parallax Eyes -->
    <g class="eye-group">
      <circle cx="165" cy="200" r="12" fill="#6366F1" filter="url(#neon_glow)"/>
      <circle cx="168" cy="196" r="4" fill="white" fill-opacity="0.8"/>
      <circle cx="235" cy="200" r="12" fill="#6366F1" filter="url(#neon_glow)"/>
      <circle cx="238" cy="196" r="4" fill="white" fill-opacity="0.8"/>
    </g>

    <!-- Glass Overly Refraction -->
    <rect x="100" y="120" width="200" height="180" rx="90" fill="url(#visor_glass)" pointer-events="none"/>
    
    <!-- Mouth / Status Indicator -->
    <rect x="180" y="250" width="40" height="4" rx="2" fill="#6366F1" filter="url(#neon_glow)">
      <animate attributeName="width" values="40; 20; 40" dur="2s" repeatCount="indefinite" />
      <animate attributeName="x" values="180; 190; 180" dur="2s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
