<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Metallic/Glass Chassis Gradient -->
    <linearGradient id="chassis_main" x1="100" y1="120" x2="300" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.5" stop-color="#E2E8F0"/>
      <stop offset="1" stop-color="#94A3B8"/>
    </linearGradient>

    <!-- Internal Glow Layer -->
    <radialGradient id="internal_pulse" cx="200" cy="200" r="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>

    <!-- Glass Highlight -->
    <linearGradient id="glass_flare" x1="150" y1="130" x2="250" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.6"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <filter id="soft_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      @keyframes float-complex {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        33% { transform: translateY(-12px) rotate(1deg); }
        66% { transform: translateY(-8px) rotate(-1deg); }
      }
      
      @keyframes blink-real {
        0%, 90%, 100% { transform: scaleY(1); opacity: 1; }
        95% { transform: scaleY(0.1); opacity: 0.8; }
      }
      
      @keyframes look-around {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-5px); }
        40% { transform: translateX(5px); }
      }

      @keyframes circuit-glow {
        0%, 100% { stroke-opacity: 0.2; stroke-width: 1; }
        50% { stroke-opacity: 0.8; stroke-width: 2; }
      }

      .whole-bot { 
        animation: float-complex 6s ease-in-out infinite; 
        transform-origin: center;
      }
      
      .eye-layer { 
        animation: blink-real 4s ease-in-out infinite, look-around 8s ease-in-out infinite; 
      }
      
      .circuit {
        animation: circuit-glow 3s ease-in-out infinite;
      }

      .antenna-pulse {
        animation: circuit-glow 2s ease-in-out infinite;
      }

      .eye-l { transform-origin: 165px 195px; }
      .eye-r { transform-origin: 235px 195px; }
    </style>
  </defs>

  <!-- Robot Container -->
  <g class="whole-bot">
    <!-- Antenna Unit -->
    <path d="M200 120V70" stroke="#64748B" stroke-width="5" stroke-linecap="round"/>
    <rect x="195" y="80" width="10" height="4" rx="2" fill="#475569"/>
    <circle class="antenna-pulse" cx="200" cy="65" r="7" fill="#818CF8" filter="url(#soft_glow)"/>
    <circle cx="200" cy="65" r="3" fill="white" fill-opacity="0.9"/>

    <!-- Main Chassis (Body/Head) -->
    <rect x="100" y="120" width="200" height="170" rx="85" fill="url(#chassis_main)" stroke="#475569" stroke-width="2"/>
    
    <!-- Internal Glowing Pulse (Background of the face) -->
    <circle cx="200" cy="195" r="70" fill="url(#internal_pulse)">
        <animate attributeName="r" values="70; 80; 70" dur="4s" repeatCount="indefinite" />
    </circle>

    <!-- Circuitry Patterns (Inner Tech) -->
    <g class="circuit" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.3">
        <path d="M140 230 Q 150 250 170 240 T 200 250 T 230 240 T 260 250"/>
        <path d="M150 260 Q 200 270 250 260"/>
        <path d="M200 130 V 150"/>
    </g>

    <!-- Glass Highlights (Refractions) -->
    <path d="M130 150 C 130 150 150 135 200 135 C 250 135 270 150 270 150" stroke="url(#glass_flare)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="130" cy="160" r="5" fill="white" fill-opacity="0.3"/>

    <!-- Eyes (Expressive) -->
    <g class="eye-layer">
      <!-- Left Eye -->
      <g class="eye-l">
        <rect x="150" y="180" width="30" height="35" rx="15" fill="#1E293B"/>
        <ellipse cx="165" cy="197" rx="8" ry="12" fill="#818CF8" filter="url(#soft_glow)"/>
        <circle cx="168" cy="192" r="3" fill="white" fill-opacity="0.8"/>
      </g>
      
      <!-- Right Eye -->
      <g class="eye-r">
        <rect x="220" y="180" width="30" height="35" rx="15" fill="#1E293B"/>
        <ellipse cx="235" cy="197" rx="8" ry="12" fill="#818CF8" filter="url(#soft_glow)"/>
        <circle cx="238" cy="192" r="3" fill="white" fill-opacity="0.8"/>
      </g>
    </g>

    <!-- Mouth Line (Subtle breathing indicator) -->
    <path d="M185 225 H 215" stroke="#475569" stroke-width="3" stroke-linecap="round">
        <animate attributeName="d" values="M185 225 H 215; M180 225 H 220; M185 225 H 215" dur="4s" repeatCount="indefinite" />
    </path>

    <!-- Shadow (Dynamic Interaction with floating) -->
    <ellipse cx="200" cy="350" rx="70" ry="12" fill="#000" fill-opacity="0.08">
      <animate attributeName="rx" values="70; 55; 70" dur="6s" repeatCount="indefinite" />
      <animate attributeName="fill-opacity" values="0.08; 0.04; 0.08" dur="6s" repeatCount="indefinite" />
    </ellipse>
  </g>
</svg>
